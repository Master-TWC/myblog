baseURL = 'https://master-twc.github.io/myblog/'
locale = 'zh-cn'
title = '谭韦常'
theme = 'hugo-theme-stack'

[markup]
    [markup.goldmark.renderer]
        unsafe = true

[params]
    favicon = "img/avatar.svg"

    mainSections = ["post"]
    dateFormat.published = "2006-01-02"
    dateFormat.lastUpdated = "2006-01-02"

    [params.sidebar]
        compact = false
        subtitle = "哟，你来啦"
        avatar = "img/lifang.gif"

    [params.footer]
        since = 2026

    [params.article]
        toc = true
        readingTime = true

    [params.widgets]
        homepage = [
            {type = "search"},
            {type = "archives"},
            {type = "categories"},
            {type = "tag-cloud"}
        ]
        page = [
            {type = "search"},
            {type = "tag-cloud"}
        ]

    [params.colorScheme]
        toggle = true
        default = "auto"

    [params.comments]
        enabled = false

    [params.imageProcessing]
        content.enabled = true
        thumbnail.enabled = true

[menu]
    [[menu.main]]
        identifier = "home"
        name = "首页"
        url = "/"
        weight = 1

    [[menu.main]]
        identifier = "archives"
        name = "归档"
        url = "/archives/"
        weight = 2

    [[menu.main]]
        identifier = "categories"
        name = "分类"
        url = "/categories/"
        weight = 3

    [[menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags/"
        weight = 4